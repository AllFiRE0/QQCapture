### Конфигурация плагина QQCapture
debug: false

### Языковые настройки
language: "ru" # ru, en, zh, ko, ja

### Глобальные настройки по умолчанию (применяются если в шаблоне не указано)
defaults:
  tick-capture: 20
  need-amount: 100000
  multiplier: 0.01
  min-players: 1
  max-players: 5
  timer-format: "mm:ss"
  send-on-rejoin: true

### Шаблоны ивентов
templates:
  "zona-zahvata":
    bossbar:
      enabled: true
      color: "GREEN"
      update-interval-ticks: 20
      start-text: "<gradient:#00FF00:#55FF55>Начинаем захват зоны!</gradient>"
      progress-text: "<gradient:#FF0000:#FFAA00>Захват: %current%/%max% (%progress%%%)</gradient>"
      end-text: "<gradient:#FF5555:#FF0000>Захват завершен!</gradient>"
      segments: 12
      update-ticks: 5
      start-delay: 1
      end-delay: 1
      timer-format: "mm:ss"
      send-on-rejoin: true
      text: "Захват зоны: %current%/%max% (Участников: %players% Групп: %groups%)"
    condition: ""
    all-players-condition: ""
    rules: {}
    permission: ""
    min-players: 1
    max-players: 30
    need-amount: 10000000
    tick-capture: 20
    multiplier: 0.1
    type-team-multiplier: "individual"
    team-multiplier: 0.0
    pos1: "1070,71,-4214"
    pos2: "1037,62,-4244"
    region-name: ""
    region-flags: ""
    max-duration: 0
    ## Настройки хранения топов
    top-storage-enabled: true
    top-storage-duration: 300
    top-auto-clear-on-start: true
    start-commands:
      - "gMessage! &aИвент захвата зоны начался!"
    tick-commands: []
    end-commands:
      - "gMessage! &aЗона захвачена! Победитель: %qqcapture_zona-zahvata_top_1_name_&6Нет победителя%"
      - "delay! 3"
      - "sound! BLOCK_ANVIL_PLACE 1.0 1.0"
      - "title:30:60:30! {#FFFFFF}Победа\n{#FF0000}Захват завершен!"
      - "check:%qqcapture_zona-zahvata_current%>=10000! asConsole! eco give %qqcapture_zona-zahvata_top_1_name% 100"
